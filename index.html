<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jorge Fouérè Andrade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #10141A;
    --surface: #171C24;
    --surface-hover: #1D2430;
    --text: #ECE8E1;
    --muted: #878D97;
    --accent: #C08A45;
    --accent-soft: rgba(192,138,69,0.14);
    --line: rgba(236,232,225,0.10);
  }

  *{ box-sizing: border-box; margin:0; padding:0; }
  html, body{ height:100%; }

  body{
    background: radial-gradient(120% 120% at 50% -10%, #1A2029 0%, #10141A 55%, #0C0F14 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 20px;
    min-height:100vh;
  }

  .card{
    width:100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 44px 36px 36px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.55);
    text-align: center;
  }

  .monogram{
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid rgba(192,138,69,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fraunces', serif;
    font-size: 19px;
    color: var(--accent);
    letter-spacing: 0.5px;
    margin: 0 auto 22px;
  }

  .name{
    font-family:'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(24px, 6vw, 30px);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .title{
    color: var(--muted);
    font-size: 13.5px;
    font-weight: 500;
    margin-top: 8px;
  }

  .hairline{
    width: 72px;
    height: 1px;
    background: var(--accent);
    margin: 30px auto 26px;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap: 10px;
    text-align: left;
  }

  .link-row{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 13px;
    text-decoration:none;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--line);
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
  }

  .link-row:hover{
    background: var(--surface-hover);
    border-color: rgba(236,232,225,0.18);
    transform: translateY(-1px);
  }

  .icon{
    width: 36px;
    height: 36px;
    min-width: 36px;
    border-radius: 10px;
    background: var(--accent-soft);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .icon svg{ width: 17px; height: 17px; stroke: var(--accent); }

  .link-text{ flex:1; }

  .label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.09em;
    color: var(--muted);
    text-transform: uppercase;
    display:block;
    margin-bottom: 2px;
  }

  .value{ font-size: 14.5px; font-weight: 500; }

  .arrow{
    width: 14px;
    height: 14px;
    stroke: var(--muted);
    transition: transform 0.2s ease;
  }

  .link-row:hover .arrow{ transform: translateX(3px); stroke: var(--text); }

  .footer{
    text-align:center;
    margin-top: 30px;
    color: var(--muted);
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @media (max-width: 380px){
    .card{ padding: 36px 24px 28px; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="monogram">JF</div>
    <div class="name">Jorge Fouérè Andrade</div>
    <div class="title">Technology Intelligence Specialist</div>
    <div class="hairline"></div>

    <div class="links">

      <a class="link-row" href="https://www.linkedin.com/in/jorgefouereandrade/" target="_blank" rel="noopener">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="label">LinkedIn</span>
          <span class="value">View professional profile</span>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>

      <a class="link-row" href="mailto:jfouere.andrade@gmail.com?subject=Contact%20from%20digital%20card">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <path d="M3 7l9 6 9-6"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="label">Email</span>
          <span class="value">Send me a message</span>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>

      <a class="link-row" href="https://wa.me/56994807006" target="_blank" rel="noopener">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="label">WhatsApp</span>
          <span class="value">Message me directly</span>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>

      <a class="link-row" href="https://app.soymach.com/rF2V/mxwpin6d" target="_blank" rel="noopener">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 3"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="label">Mach</span>
          <span class="value">Send me a payment</span>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>

    </div>

    <div class="footer">Digital card · tap to continue</div>
  </div>

</body>
</html>
